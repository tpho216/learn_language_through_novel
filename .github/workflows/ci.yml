name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx fastapi uvicorn
      - name: Run tests
        run: python -m pytest -q

  generate:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install httpx fastapi uvicorn
      - name: Make scripts executable
        run: chmod +x scripts/run_task_with_server.sh scripts/generate.py || true
      - name: Run generation task (starts server, runs task, stops server)
        # uses the helper that starts a temporary uvicorn server and runs the task
        run: ./scripts/run_task_with_server.sh tasks/task1.json 8000 30
      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: generation-outputs
          path: outputs
